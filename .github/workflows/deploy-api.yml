name: Deploy API

on:
  push:
    branches: [main, develop]

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  deploy-staging:
    needs: checks
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @tatamiq/database db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config apps/api/fly.toml --app tatamiq-api-stg --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-production:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @tatamiq/database db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config apps/api/fly.toml --app tatamiq-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
