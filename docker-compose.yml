services:
  postgres:
    image: postgres:16-alpine
    container_name: tatamiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tatamiq
      POSTGRES_USER: tatamiq
      POSTGRES_PASSWORD: tatamiq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tatamiq -d tatamiq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
