<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18181b" />
    <title>Tatamiq offline</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #09090b; color: #fafafa; }
      main { width: min(28rem, calc(100% - 2rem)); text-align: center; border: 1px solid #27272a; border-radius: 2rem; padding: 2rem; background: #18181b; box-shadow: 0 24px 80px rgba(0,0,0,.35); }
      img { width: 4rem; height: 4rem; margin-bottom: 1rem; }
      h1 { margin: 0; font-size: 1.35rem; }
      p { color: #a1a1aa; line-height: 1.5; }
      button { border: 0; border-radius: 999px; background: #fafafa; color: #09090b; font-weight: 700; padding: .8rem 1.1rem; }
    </style>
  </head>
  <body>
    <main>
      <img src="/android-chrome-192x192.png" alt="Tatamiq" />
      <h1>Você está sem internet</h1>
      <p>O portal precisa de conexão para carregar seus dados mais recentes. Confira sua rede e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
